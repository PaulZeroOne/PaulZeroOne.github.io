<title>Portfolio — AP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --tp1: #00ffff; --tp2: #ff00ff; --tp3: #00ff66; --tp4: #ff8800;
    --bg: #060a0f; --panel: #0c1219; --panel2: #101820;
    --border: rgba(255,255,255,0.06); --text: #cdd6e0; --text-dim: #6a7d8e;
    --font-mono: 'Share Tech Mono', monospace; --font-ui: 'Rajdhani', sans-serif;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:var(--font-ui); color:var(--text); }
  canvas { display:block; }
  #hud { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:18px 32px; background:linear-gradient(to bottom, rgba(6,10,15,0.95) 60%, transparent); z-index:10; pointer-events:none; }
  #hud-left { display:flex; flex-direction:column; }
  #hud-name { font-family:var(--font-ui); font-size:22px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#e8edf2; }
  #hud-title { font-family:var(--font-mono); font-size:11px; color:var(--text-dim); letter-spacing:0.2em; margin-top:3px; }
  #hud-right { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); text-align:right; line-height:1.8; }
  .hud-indicator { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--tp3); box-shadow:0 0 6px var(--tp3); margin-right:6px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  #statusbar { position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:10px 32px; background:linear-gradient(to top, rgba(6,10,15,0.95) 60%, transparent); font-family:var(--font-mono); font-size:10px; color:var(--text-dim); z-index:10; pointer-events:none; }
  #tooltip { position:fixed; padding:7px 14px; background:rgba(12,18,25,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:4px; font-family:var(--font-mono); font-size:11px; color:#e0e8f0; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity 0.18s ease, transform 0.18s ease; z-index:50; white-space:nowrap; }
  #tooltip.visible { opacity:1; transform:translateY(0); }
  #tooltip-label { font-weight:600; margin-bottom:2px; letter-spacing:0.05em; }
  #tooltip-hint { font-size:9px; color:var(--text-dim); letter-spacing:0.08em; }
  #modal-overlay { position:fixed; inset:0; background:rgba(4,8,12,0.82); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
  #modal-overlay.open { opacity:1; pointer-events:all; }
  #modal { width:min(720px,94vw); max-height:82vh; background:var(--panel); border-radius:10px; border:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transform:translateY(20px) scale(0.97); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); box-shadow:0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04); position:relative; }
  #modal-overlay.open #modal { transform:translateY(0) scale(1); }
  #modal::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--modal-accent,#00ffff); box-shadow:0 0 16px var(--modal-accent,#00ffff); z-index:1; }
  #modal-header { padding:22px 28px 16px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0; background:var(--panel); }
  #modal-tp-badge { font-family:var(--font-mono); font-size:10px; letter-spacing:0.2em; color:var(--modal-accent,#00ffff); text-shadow:0 0 8px var(--modal-accent,#00ffff); margin-bottom:6px; }
  #modal-title { font-family:var(--font-ui); font-size:26px; font-weight:700; letter-spacing:0.04em; color:#e8edf2; }
  #modal-close { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; margin-left:16px; margin-top:4px; font-family:var(--font-mono); }
  #modal-close:hover { background:rgba(255,255,255,0.06); color:#e8edf2; border-color:rgba(255,255,255,0.16); }
  #modal-body { padding:28px; overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent; }
  #modal-body::-webkit-scrollbar { width:4px; }
  #modal-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }
  .section-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.25em; color:var(--text-dim); text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .bio-text { font-size:15px; line-height:1.75; color:var(--text); margin-bottom:24px; font-weight:400; }
  .skill-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:28px; }
  .skill-tag { padding:7px 12px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); text-align:center; letter-spacing:0.05em; }
  .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:24px; }
  @media (max-width:500px) { .card-grid { grid-template-columns:1fr; } }
  .project-card { background:var(--panel2); border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; transition:border-color 0.2s, transform 0.2s; }
  .project-card:hover { border-color:rgba(255,255,255,0.14); transform:translateY(-2px); }
  .project-thumb { position:relative; width:100%; aspect-ratio:16/9; background:linear-gradient(135deg,#0c1722 0%,#0a2233 100%); display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:1px solid var(--border); }
  .project-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .project-thumb .thumb-fallback { display:none; position:absolute; padding:0 16px; text-align:center; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; line-height:1.6; color:rgba(170,195,220,0.45); text-transform:uppercase; }
  .project-thumb.noimg { background:repeating-linear-gradient(45deg,#0b1a26,#0b1a26 8px,#0c1d2b 8px,#0c1d2b 16px); }
  .project-thumb.noimg .thumb-fallback { display:block; }
  .project-card-body { padding:16px 18px; display:flex; flex-direction:column; flex:1; }
  .project-links { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .proj-link { display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border:1px solid var(--border); border-radius:7px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; color:var(--text-dim); text-decoration:none; transition:border-color 0.18s, color 0.18s; }
  .proj-link:hover { border-color:var(--modal-accent,#ff3df0); color:var(--modal-accent,#ff3df0); }
  .proj-link svg { width:14px; height:14px; fill:currentColor; }
  .project-card-tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.2em; color:var(--modal-accent,#00ffff); margin-bottom:8px; }
  .project-card-title { font-size:15px; font-weight:700; letter-spacing:0.03em; color:#e0e8f2; margin-bottom:8px; }
  .project-card-desc { font-size:12px; line-height:1.6; color:var(--text-dim); }
  .timeline { display:flex; flex-direction:column; gap:0; margin-bottom:24px; }
  .timeline-item { display:grid; grid-template-columns:90px 1fr; gap:20px; padding:18px 0; border-bottom:1px solid var(--border); position:relative; }
  .timeline-item:last-child { border-bottom:none; }
  .timeline-date { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:0.08em; padding-top:3px; }
  .timeline-role { font-size:15px; font-weight:700; color:#dde6ee; letter-spacing:0.03em; margin-bottom:4px; }
  .timeline-company { font-family:var(--font-mono); font-size:11px; color:var(--modal-accent,#00ffff); margin-bottom:8px; text-shadow:0 0 6px var(--modal-accent,#00ffff); }
  .timeline-desc { font-size:12px; line-height:1.65; color:var(--text-dim); }
  .group-card { background:var(--panel2); border:1px solid var(--border); border-left:3px solid var(--modal-accent,#ff8800); border-radius:8px; padding:14px 16px; margin-bottom:10px; transition:border-color 0.2s; }
  .group-card:hover { border-color:var(--modal-accent,#ff8800); }
  .group-card-name { font-size:14px; font-weight:700; color:#dde6ee; margin-bottom:4px; }
  .group-card-role { font-family:var(--font-mono); font-size:10px; color:var(--modal-accent,#ff8800); letter-spacing:0.08em; margin-bottom:6px; }
  .group-card-desc { font-size:12px; color:var(--text-dim); line-height:1.5; }
  .contact-icons { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
  .contact-link { display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; color:var(--text-dim); text-decoration:none; font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; transition:border-color 0.2s, color 0.2s; }
  .contact-link:hover { border-color:var(--modal-accent,#ff8800); color:var(--modal-accent,#ff8800); }
  .contact-link svg { width:16px; height:16px; flex-shrink:0; fill:currentColor; }
  #loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; transition:opacity 0.6s ease; }
  #loading.hidden { opacity:0; pointer-events:none; }
  .load-pcb-icon { width:60px; height:60px; border:2px solid rgba(0,255,102,0.2); border-top-color:var(--tp3); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:20px; }

  #contact-fab-toggle svg { width:16px; height:16px; fill:currentColor; }

  .fab-link { display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(12,18,25,0.92); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:var(--text-dim); text-decoration:none; font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em; cursor:pointer; transition:border-color 0.2s, color 0.2s; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); white-space:nowrap; }
  .fab-link:hover { border-color:var(--tp1); color:var(--tp1); }
  .fab-link svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }


  #resume-btn { display:flex; align-items:center; gap:8px; padding:10px 18px; background:rgba(12,18,25,0.92); border:1px solid var(--tp4,#ffb020); border-radius:8px; color:var(--tp4,#ffb020); font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; cursor:pointer; text-decoration:none; transition:background 0.2s, box-shadow 0.2s; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  #resume-btn:hover { background:rgba(20,28,36,0.98); box-shadow:0 0 14px rgba(255,176,32,0.35); }
  #resume-btn svg { width:15px; height:15px; fill:currentColor; }
  #rr-reset { position:fixed; bottom:48px; left:32px; z-index:20; display:none; align-items:center; gap:8px; padding:10px 18px; background:rgba(12,18,25,0.92); border:1px solid rgba(255,255,255,0.14); border-radius:8px; color:#cdd6e0; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; cursor:pointer; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  #rr-reset:hover { border-color:var(--tp2,#ff3df0); color:var(--tp2,#ff3df0); }
  #onboard-hint { position:fixed; left:50%; bottom:84px; transform:translateX(-50%); z-index:15; padding:9px 18px; background:rgba(10,16,22,0.92); border:1px solid rgba(255,255,255,0.12); border-radius:20px; font-family:var(--font-mono); font-size:11px; color:#cdd6e0; letter-spacing:0.06em; pointer-events:none; opacity:0; transition:opacity 0.5s; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); white-space:nowrap; }
  #onboard-hint.show { opacity:1; }

  /* ---------- Mobile parity ---------- */
  @media (max-width: 720px) {
    #hud { padding:12px 16px; }
    #hud-name { font-size:16px; letter-spacing:0.08em; }
    #hud-title { font-size:8.5px; letter-spacing:0.12em; }
    #hud-right { font-size:8.5px; line-height:1.7; }
    #statusbar { padding:8px 16px; font-size:8.5px; }
    #statusbar .sb-hint { display:none; }
    #contact-fab { bottom:16px; right:16px; gap:6px; }
    #contact-fab-toggle, #resume-btn { padding:11px 15px; font-size:11px; }
    #rr-reset { bottom:16px; left:16px; padding:11px 15px; }
    #onboard-hint { bottom:70px; font-size:10px; padding:8px 14px; }
    #modal { width:100%; max-width:100%; height:100%; max-height:100%; border-radius:0; }
    #modal-overlay { padding:0; }
    #modal-header { padding:16px 18px 12px; }
    #modal-title { font-size:22px; }
    #modal-body { padding:16px 18px 28px; }
    .card-grid { grid-template-columns:1fr; gap:12px; }
    .skill-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
    .timeline-item { grid-template-columns:70px 1fr; gap:12px; }
    #tooltip { display:none; }
  }
</style>

<script>
'use strict';

const BOARD = { w: 9, h: 6, depth: 0.16, radius: 0.28 };

const TP_CONFIG = [
  // pos = functional pad (trace anchor); panel = clear-area neon label
  { id:'TP1', word:'ABOUT',      color:0x33b7ff, cssColor:'#33b7ff', pos:[-2.8,-1.4], panel:[-3.7,-2.45], section:'about'      },
  { id:'TP2', word:'PROJECTS',   color:0xff3df0, cssColor:'#ff3df0', pos:[ 2.6, 0.6], panel:[ 3.95, 0.30], section:'projects'   },
  { id:'TP3', word:'EXPERIENCE', color:0x18ffd0, cssColor:'#18ffd0', pos:[-0.4, 1.8], panel:[ 0.15, 2.85], section:'experience' },
  { id:'TP4', word:'COLLABS',    color:0xffb020, cssColor:'#ffb020', pos:[ 3.0,-2.0], panel:[ 2.05, 2.70], section:'collabs'    },
];

const TRACE_CONFIG = { width: 0.026, height: 0.012 };

let renderer, scene, camera, controls;
let clock, raycaster;
const mouse = new THREE.Vector2(-999, -999);
let testPointMeshes = [];
let hoveredTP = null;
let idleRotating = true;
let animFrameId;
let envTexture = null;
let viewSide = 'top';            // 'top' | 'back'
let camTween = null;             // THREE.Vector3 target while flipping
let starfield = null, nebula = null;

// ── Studio environment map → realistic copper / solder reflections ──────
function makeStudioEnv() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0.0, '#141a22');
  g.addColorStop(0.45,'#0a0e14');
  g.addColorStop(1.0, '#04070a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 512);
  function soft(x, y, rx, ry, a) {
    ctx.save(); ctx.translate(x, y); ctx.scale(rx / ry, 1);
    const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, ry);
    rg.addColorStop(0, `rgba(255,248,235,${a})`);
    rg.addColorStop(1, 'rgba(255,248,235,0)');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(0, 0, ry, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  soft(250, 120, 230, 70, 0.95);   // key softbox
  soft(770, 150, 200, 60, 0.6);    // fill softbox
  soft(520, 405, 320, 80, 0.22);   // low bounce
  const tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const env = pmrem.fromEquirectangular(tex).texture;
  pmrem.dispose(); tex.dispose();
  return env;
}

// ── Deep-space backdrop: gradient sky + drifting starfield + faint nebula ──
function makeSpaceBackground() {
  const c = document.createElement('canvas'); c.width = 16; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0.0, '#0b1426');   // deep space blue
  g.addColorStop(0.55,'#070d18');
  g.addColorStop(1.0, '#04060b');   // near-black horizon
  ctx.fillStyle = g; ctx.fillRect(0, 0, 16, 512);
  return new THREE.CanvasTexture(c);
}

function makeStarfield() {
  const N = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  const palette = [[1,1,1],[0.70,0.85,1.0],[1.0,0.9,0.75],[0.8,0.95,1.0]];
  for (let i = 0; i < N; i++) {
    const r  = 34 + Math.random() * 36;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.cos(ph);
    pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    const cc = palette[(Math.random() * palette.length) | 0];
    const b  = 0.45 + Math.random() * 0.55;
    col[i*3] = cc[0]*b; col[i*3+1] = cc[1]*b; col[i*3+2] = cc[2]*b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size:0.2, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.9, depthWrite:false, blending:THREE.AdditiveBlending, fog:false });
  return new THREE.Points(geo, mat);
}

function makeNebula() {
  const grp = new THREE.Group();
  const clouds = [
    { hex:0x18ffd0, pos:[-26, 10,-34], s:40 },   // teal
    { hex:0xff3df0, pos:[ 30, -8,-36], s:46 },   // magenta
    { hex:0x33b7ff, pos:[-32,-12,-30], s:38 },   // blue
    { hex:0xffb020, pos:[ 24, 16,-38], s:34 },   // gold
  ];
  clouds.forEach(({hex,pos,s}) => {
    const c = document.createElement('canvas'); c.width = c.height = 256;
    const ctx = c.getContext('2d');
    const col = '#' + hex.toString(16).padStart(6,'0');
    const rg = ctx.createRadialGradient(128,128,0,128,128,128);
    rg.addColorStop(0,   col + '4d');
    rg.addColorStop(0.4, col + '18');
    rg.addColorStop(1,   col + '00');
    ctx.fillStyle = rg; ctx.fillRect(0,0,256,256);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(c),
      blending:THREE.AdditiveBlending, transparent:true, opacity:0.45, depthWrite:false, fog:false }));
    sp.scale.set(s, s, 1); sp.position.set(pos[0], pos[1], pos[2]);
    grp.add(sp);
  });
  return grp;
}

// ── Subtle solder-mask micro-texture (normal map) for surface depth ─────
function makeMaskNormal() {
  const s = 256;
  const c = document.createElement('canvas'); c.width = c.height = s;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(s, s);
  for (let i = 0; i < img.data.length; i += 4) {
    img.data[i]   = 128 + (Math.random() - 0.5) * 26;
    img.data[i+1] = 128 + (Math.random() - 0.5) * 26;
    img.data[i+2] = 255;
    img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(10, 7);
  return t;
}

let matSolderMask, matCopperPad, matSilkscreen, matFR4Edge, matVia, matSolder, matCopperTrace;

function roundedRectShape(w, h, r) {
  const s = new THREE.Shape();
  s.moveTo(-w/2 + r, -h/2);
  s.lineTo( w/2 - r, -h/2);
  s.quadraticCurveTo( w/2, -h/2,  w/2, -h/2 + r);
  s.lineTo( w/2,  h/2 - r);
  s.quadraticCurveTo( w/2,  h/2,  w/2 - r,  h/2);
  s.lineTo(-w/2 + r,  h/2);
  s.quadraticCurveTo(-w/2,  h/2, -w/2,  h/2 - r);
  s.lineTo(-w/2, -h/2 + r);
  s.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
  return s;
}

const MOUNT_HOLES = [
  [-BOARD.w/2 + 0.4, -BOARD.h/2 + 0.4],
  [ BOARD.w/2 - 0.4, -BOARD.h/2 + 0.4],
  [-BOARD.w/2 + 0.4,  BOARD.h/2 - 0.4],
  [ BOARD.w/2 - 0.4,  BOARD.h/2 - 0.4],
];
const MOUNT_HOLE_R = 0.115;

function createBoard() {
  const group = new THREE.Group();
  const { w, h, depth, radius } = BOARD;
  const shape = roundedRectShape(w, h, radius);
  MOUNT_HOLES.forEach(([hx, hy]) => {
    const holePath = new THREE.Path();
    holePath.absarc(hx, hy, MOUNT_HOLE_R, 0, Math.PI * 2, true);
    shape.holes.push(holePath);
  });
  const pcbGeo = new THREE.ExtrudeGeometry(shape, { steps:1, depth:depth, bevelEnabled:false });
  pcbGeo.center();
  const pcbMesh = new THREE.Mesh(pcbGeo, [matSolderMask, matFR4Edge]);
  pcbMesh.rotation.x = -Math.PI / 2;
  pcbMesh.castShadow = true; pcbMesh.receiveShadow = true;
  group.add(pcbMesh);
  const annW = 0.08;
  const yFaceTop = depth / 2, yFaceBot = -depth / 2;
  MOUNT_HOLES.forEach(([hx, hy]) => {
    const wx = hx, wz = hy;
    const ringGeo = new THREE.RingGeometry(MOUNT_HOLE_R, MOUNT_HOLE_R + annW, 48);
    const ringTop = new THREE.Mesh(ringGeo, matCopperPad.clone());
    ringTop.rotation.x = -Math.PI / 2; ringTop.position.set(wx, yFaceTop + 0.001, wz); group.add(ringTop);
    const ringBot = new THREE.Mesh(ringGeo.clone(), matCopperPad.clone());
    ringBot.rotation.x = Math.PI / 2; ringBot.position.set(wx, yFaceBot - 0.001, wz); group.add(ringBot);
    const barrel = new THREE.Mesh(
      new THREE.CylinderGeometry(MOUNT_HOLE_R, MOUNT_HOLE_R, depth, 48, 1, true),
      new THREE.MeshStandardMaterial({ color:0x9a9aa0, roughness:0.3, metalness:0.9, side:THREE.BackSide, envMapIntensity:1.0 }));
    barrel.position.set(wx, 0, wz); group.add(barrel);
  });
  addBoardOutline(group, w, h, radius, depth);
  return group;
}

function addBoardOutline(group, w, h, r, depth) {
  const points = [];
  const segs = 16;
  const corners = [
    [ w/2 - r,  h/2 - r, r, 0,           Math.PI/2],
    [-w/2 + r,  h/2 - r, r, Math.PI/2,   Math.PI],
    [-w/2 + r, -h/2 + r, r, Math.PI,     3*Math.PI/2],
    [ w/2 - r, -h/2 + r, r, 3*Math.PI/2, 2*Math.PI],
  ];
  corners.forEach(([cx, cz, cr, aStart, aEnd]) => {
    for (let i = 0; i <= segs; i++) {
      const a = aStart + (aEnd - aStart) * i / segs;
      points.push(new THREE.Vector3(cx + Math.cos(a) * cr, depth/2 + 0.005, cz + Math.sin(a) * cr));
    }
  });
  points.push(points[0].clone());
  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color:0xd6dcc4, transparent:true, opacity:0.45 }));
  group.add(line);
}

const pads = {};
function regPad(net, x, z) {
  if (!pads[net]) pads[net] = [];
  pads[net].push([x, z]);
  return [x, z];
}

// Keep-out test used by via scatter + label placement (avoid mount holes & MCU)
function nearMountHole(x, z, r) {
  return MOUNT_HOLES.some(([hx, hy]) => ((x-hx)**2 + (z-hy)**2) < r*r);
}
function createComponents() {
  const group = new THREE.Group();
  const Y = BOARD.depth / 2;
  const pinMat   = new THREE.MeshStandardMaterial({ color:0xb6bac2, roughness:0.28, metalness:0.92, envMapIntensity:1.15 });
  const epoxyMat = new THREE.MeshStandardMaterial({ color:0x14161a, roughness:0.42, metalness:0.05, envMapIntensity:0.6 });
  const epoxyTop = new THREE.MeshStandardMaterial({ color:0x1b1e24, roughness:0.55, metalness:0.05, envMapIntensity:0.5 });

  function box(w,h,d, mat, x,y,z, ry=0) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(x,y,z); m.rotation.y=ry; m.castShadow=true; group.add(m); return m;
  }
  // Realistic solder fillet at a pad/lead (flattened metallic blob)
  const solderGeo = new THREE.SphereGeometry(1, 10, 8);
  function solder(x, z, r=0.05) {
    const m = new THREE.Mesh(solderGeo, matSolder);
    m.position.set(x, Y + 0.012, z);
    m.scale.set(r, r * 0.45, r); m.castShadow = true; group.add(m);
  }
  // Bare copper landing pad under a component lead
  function land(x, z, r=0.05) {
    const m = new THREE.Mesh(new THREE.CircleGeometry(r, 16), matCopperPad);
    m.rotation.x = -Math.PI/2; m.position.set(x, Y + 0.003, z); group.add(m);
  }

  let _gndIdx = 0;
  // 0402/0603 chip resistor or MLCC — body with metallized terminations + solder
  function chip(x, z, ry, net1, net2, bodyCol) {
    const bMat = new THREE.MeshStandardMaterial({ color:bodyCol, roughness:0.6, metalness:0.05, envMapIntensity:0.5 });
    box(0.17,0.06,0.10, bMat, x, Y+0.030, z, ry);
    const p1x = x - Math.cos(ry)*0.085, p1z = z + Math.sin(ry)*0.085;
    const p2x = x + Math.cos(ry)*0.085, p2z = z - Math.sin(ry)*0.085;
    box(0.03,0.062,0.10, pinMat, p1x, Y+0.030, p1z, ry);
    box(0.03,0.062,0.10, pinMat, p2x, Y+0.030, p2z, ry);
    land(p1x,p1z,0.06); land(p2x,p2z,0.06);
    solder(p1x,p1z,0.055); solder(p2x,p2z,0.055);
    const n2 = (net2==='gnd') ? `gnd_${_gndIdx++}` : net2;
    if (net1) regPad(net1, p1x, p1z);
    if (net2) regPad(n2, p2x, p2z);
  }
  function r0402(x,z,ry,n1,n2){ chip(x,z,ry,n1,n2,0x2a2018); }   // dark resistor
  function c0402(x,z,ry,n1,n2){ chip(x,z,ry,n1,n2,0xcdb27a); }   // tan MLCC

  // SMD tantalum capacitor — molded case with polarity bar (replaces blue cylinders)
  function tantalum(x, z, ry, netP, netN, col=0xd8a330) {
    const bMat = new THREE.MeshStandardMaterial({ color:col, roughness:0.5, metalness:0.1, envMapIntensity:0.6 });
    box(0.30,0.13,0.20, bMat, x, Y+0.065, z, ry);
    // polarity stripe on + end
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.135,0.20),
      new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:0.6 }));
    stripe.position.set(x - Math.cos(ry)*0.11, Y+0.065, z + Math.sin(ry)*0.11); stripe.rotation.y=ry; group.add(stripe);
    const p1x=x-Math.cos(ry)*0.16, p1z=z+Math.sin(ry)*0.16;
    const p2x=x+Math.cos(ry)*0.16, p2z=z-Math.sin(ry)*0.16;
    box(0.05,0.05,0.18, pinMat, p1x, Y+0.022, p1z, ry);
    box(0.05,0.05,0.18, pinMat, p2x, Y+0.022, p2z, ry);
    land(p1x,p1z,0.09); land(p2x,p2z,0.09);
    solder(p1x,p1z,0.08); solder(p2x,p2z,0.08);
    if(netP) regPad(netP, p1x, p1z);
    if(netN) regPad(netN, p2x, p2z);
  }

  // One realistic aluminium electrolytic can (sensible: near power-in)
  function electrolytic(x, z, h, r, netP, netN) {
    const can = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 24),
      new THREE.MeshStandardMaterial({ color:0x20242c, roughness:0.35, metalness:0.55, envMapIntensity:1.0 }));
    can.position.set(x, Y+h/2, z); can.castShadow=true; group.add(can);
    const top = new THREE.Mesh(new THREE.CylinderGeometry(r*0.96, r*0.96, 0.02, 24),
      new THREE.MeshStandardMaterial({ color:0xc9ccd2, roughness:0.3, metalness:0.85, envMapIntensity:1.2 }));
    top.position.set(x, Y+h+0.005, z); group.add(top);
    // vent cross
    const vent = new THREE.Mesh(new THREE.BoxGeometry(r*1.2,0.004,r*0.18),
      new THREE.MeshStandardMaterial({color:0x55585e,roughness:0.6}));
    vent.position.set(x, Y+h+0.018, z); group.add(vent);
    const vent2 = vent.clone(); vent2.rotation.y=Math.PI/2; vent2.position.copy(vent.position); group.add(vent2);
    // polarity stripe down the side
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.03,h*0.8,0.02),
      new THREE.MeshStandardMaterial({color:0xcfd3da,roughness:0.4}));
    stripe.position.set(x-r-0.002, Y+h/2, z); group.add(stripe);
    land(x+r*0.5,z,0.08); land(x-r*0.5,z,0.08);
    solder(x+r*0.5,z,0.07); solder(x-r*0.5,z,0.07);
    if(netP) regPad(netP, x+r*0.5, z);
    if(netN) regPad(netN, x-r*0.5, z);
  }

  // SOIC-8 with gull-wing leads, pin-1 dot, solder fillets
  function soic8(x, z, ry, nets) {
    box(0.55,0.13,0.92, epoxyMat, x, Y+0.065, z, ry);
    box(0.50,0.03,0.86, epoxyTop, x, Y+0.135, z, ry); // bevelled top
    [[-1,0],[1,4]].forEach(([side, nOff]) => {
      for (let i=0;i<4;i++) {
        const pz = z + (-0.30+i*0.20)*Math.cos(ry);
        const px = x + side*Math.cos(ry)*0.34;
        box(0.12,0.025,0.07, pinMat, px, Y+0.014, pz, ry);     // foot
        box(0.025,0.06,0.07, pinMat, px - side*0.05, Y+0.045, pz, ry); // shoulder
        land(px,pz,0.055); solder(px,pz,0.05);
        const net = nets && nets[nOff+i];
        if (net) regPad(net, px, pz);
      }
    });
    const dot = new THREE.Mesh(new THREE.CircleGeometry(0.028,12), new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:1}));
    dot.rotation.x=-Math.PI/2; dot.position.set(x-0.18*Math.cos(ry), Y+0.137, z-0.30*Math.cos(ry)); group.add(dot);
  }

  function sot23(x, z, ry, nets) {
    box(0.18,0.09,0.24, epoxyMat, x, Y+0.045, z, ry);
    [-0.085,0,0.085].forEach((dz,i) => {
      const px = x - Math.cos(ry)*0.13;
      const pz = z + dz*Math.cos(ry);
      box(0.08,0.02,0.05, pinMat, px, Y+0.012, pz, ry);
      land(px,pz,0.045); solder(px,pz,0.04);
      if (nets && nets[i]) regPad(nets[i], px, pz);
    });
  }

  function diode(x, z, ry, netA, netK) {
    box(0.24,0.08,0.14, epoxyMat, x, Y+0.04, z, ry);
    const band = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.082,0.14),
      new THREE.MeshStandardMaterial({color:0xcfd3da,roughness:0.5,metalness:0.3}));
    band.position.set(x+Math.cos(ry)*0.10, Y+0.04, z-Math.sin(ry)*0.10); band.rotation.y=ry; group.add(band);
    const ax=x-Math.cos(ry)*0.135, az=z+Math.sin(ry)*0.135;
    const kx=x+Math.cos(ry)*0.135, kz=z-Math.sin(ry)*0.135;
    box(0.05,0.02,0.10, pinMat, ax, Y+0.012, az, ry);
    box(0.05,0.02,0.10, pinMat, kx, Y+0.012, kz, ry);
    land(ax,az,0.05); land(kx,kz,0.05); solder(ax,az,0.045); solder(kx,kz,0.045);
    if(netA) regPad(netA,ax,az);
    if(netK) regPad(netK,kx,kz);
  }

  function inductor(x, z, net1, net2) {
    box(0.28,0.12,0.24, new THREE.MeshStandardMaterial({color:0x2a2014,roughness:0.65,metalness:0.1,envMapIntensity:0.5}), x, Y+0.06, z);
    const wireMat = new THREE.MeshStandardMaterial({color:0xcc9933,roughness:0.3,metalness:0.9,envMapIntensity:1.1});
    for(let i=0;i<4;i++){
      const w=new THREE.Mesh(new THREE.TorusGeometry(0.085,0.014,6,12),wireMat);
      w.position.set(x-0.09+i*0.06,Y+0.06,z); w.rotation.y=Math.PI/2; group.add(w);
    }
    land(x-0.15,z,0.06); land(x+0.15,z,0.06); solder(x-0.15,z,0.055); solder(x+0.15,z,0.055);
    if(net1) regPad(net1, x-0.15, z);
    if(net2) regPad(net2, x+0.15, z);
  }

  function crystal(x, z, net1, net2) {
    box(0.24,0.085,0.46, new THREE.MeshStandardMaterial({color:0xcfd2c0,roughness:0.3,metalness:0.8,envMapIntensity:1.2}), x, Y+0.043, z);
    box(0.10,0.04,0.06, pinMat, x, Y+0.02, z-0.23); box(0.10,0.04,0.06, pinMat, x, Y+0.02, z+0.23);

  // 10-pin JTAG header (2x5 shrouded box header)
  function jtag10(x, z, ry, nets) {

  // Right-angle multi-pin GPIO/backplane edge header.

  function gpioRightAngle(x, z, ry, nets) {
    const shellMat = new THREE.MeshStandardMaterial({color:0x141418,roughness:0.5,metalness:0.1,envMapIntensity:0.6});
    // black body sits just inside the board edge

    box(0.18,0.40,0.07, shellMat, x+0.20, Y+0.20, z-0.78, ry);  // wall
    box(0.18,0.40,0.07, shellMat, x+0.20, Y+0.20, z+0.78, ry);  // wall

  // ── Center MCU: QFP-32 with defined gull-wing leads on 4 sides ───────
  box(1.55,0.14,1.55, epoxyMat, 0, Y+0.07, 0);
  box(1.40,0.03,1.40, epoxyTop, 0, Y+0.15, 0);
  const mcuNets = {
    R:['mN_R0','mN_R1','mN_R2','mN_R3','mN_R4','mN_R5','mN_R6','mN_R7'],

    T:['mN_T0','mN_T1','mN_T2','mN_T3','mN_T4','mN_T5','mN_T6','mN_T7'],
    B:['mN_B0','mN_B1','mN_B2','mN_B3','mN_B4','mN_B5','mN_B6','mN_B7'],

  (['R','L']).forEach(side => {
    const sx = side==='R' ? 0.86 : -0.86;
    mcuNets[side].forEach((net,i) => {
      const pz = -0.49 + i*0.14;
      box(0.14,0.022,0.06, pinMat, sx, Y+0.014, pz);                    // foot
      box(0.03,0.055,0.06, pinMat, sx - Math.sign(sx)*0.06, Y+0.05, pz);// shoulder
      land(sx,pz,0.045); solder(sx,pz,0.04);
      regPad(net, sx, pz);
    });
  });
  (['T','B']).forEach(side => {
    const sz = side==='T' ? -0.86 : 0.86;
    mcuNets[side].forEach((net,i) => {
      const px = -0.49 + i*0.14;
      box(0.06,0.022,0.14, pinMat, px, Y+0.014, sz);
      box(0.06,0.055,0.03, pinMat, px, Y+0.05, sz - Math.sign(sz)*0.06);

  const mcuDot=new THREE.Mesh(new THREE.CircleGeometry(0.05,14), new THREE.MeshStandardMaterial({color:0x444444,roughness:1}));
  mcuDot.rotation.x=-Math.PI/2; mcuDot.position.set(-0.62,Y+0.152,-0.62); group.add(mcuDot);

  // ── ICs ──────────────────────────────────────────────────────────────
  soic8( 2.0, 2.0, 0,    ['u2L0','u2L1','u2L2','u2L3', 'u2R0','u2R1','u2R2','u2R3']);
  soic8(-3.0, 0.6, 0,    ['u3L0','u3L1','u3L2','u3L3', 'u3R0','u3R1','u3R2','u3R3']);
  soic8(-3.0,-0.8, 0,    ['u4L0','u4L1','u4L2','u4L3', 'u4R0','u4R1','u4R2','u4R3']);
  soic8( 3.4,-0.6, 0,    ['u5L0','u5L1','u5L2','u5L3', 'u5R0','u5R1','u5R2','u5R3']);

  // ── Capacitors: one electrolytic (power-in), rest tantalum SMD ───────
  electrolytic(-3.6, 2.2, 0.32, 0.16, 'c3p','c3n');
  tantalum( 1.8,-0.4, 0, 'c1p','c1n');
  tantalum( 1.8, 0.4, 0, 'c2p','c2n');
  tantalum( 3.6, 2.0, 0, 'c4p','c4n', 0x4060c0);
  tantalum(-1.8, 2.6, 0, 'c5p','c5n', 0x2a8a3a);
  tantalum(-0.8,-2.0, 0, 'c6p','c6n', 0x6a3aa0);

  // ── MLCC decoupling ──────────────────────────────────────────────────
  c0402(-1.4, 0.6, 0, 'mN_L4','gnd');  c0402(-1.4, 0.8, 0, 'mN_L5','gnd');
  c0402(-1.4, 1.0, 0, 'mN_L6','gnd');  c0402(-1.4, 1.2, 0, 'mN_L7','gnd');
  c0402( 1.4,-0.6, 0, 'mN_R0','gnd');  c0402( 1.4,-0.4, 0, 'mN_R1','gnd');
  c0402(-3.6, 0.2, 0, 'u3L0','gnd');   c0402(-3.6, 0.4, 0, 'u3L1','gnd');
  c0402(-3.6,-1.0, 0, 'u4L0','gnd');   c0402(-3.6,-1.2, 0, 'u4L1','gnd');
  c0402( 3.6,-0.2, 0, 'u5R0','gnd');   c0402( 3.6,-0.4, 0, 'u5R1','gnd');
  c0402( 1.6, 1.6, 0, 'u2L0','gnd');   c0402( 1.6, 1.8, 0, 'u2L1','gnd');
  c0402(-0.4,-2.4, 0, 'mN_T3','gnd');  c0402(-0.2,-2.4, 0, 'mN_T4','gnd');
  c0402(-2.0,-2.4, Math.PI/2, 'u4L2','gnd');
  c0402( 2.6,-1.6, 0, 'u5L2','gnd');

  // ── Resistors ────────────────────────────────────────────────────────
  r0402(-2.2, 0.0, 0, 'mN_L3','u3R2'); r0402(-2.2,-0.2, 0, 'mN_L2','u3R1');
  r0402(-2.2,-0.4, 0, 'mN_L1','u3R0'); r0402(-2.2,-0.6, 0, 'mN_L0','u4R3');
  r0402( 2.8, 0.4, 0, 'mN_R5','u5L3'); r0402( 2.8, 0.2, 0, 'mN_R4','u5L2');
  r0402( 0.6, 2.2, Math.PI/2, 'u2L2','mN_B5'); r0402( 0.8, 2.2, Math.PI/2, 'u2L3','mN_B6');
  r0402( 0.4,-2.6, 0, 'mN_T5','c6p');  r0402( 0.6,-2.6, 0, 'mN_T6','c6n');
  r0402(-1.2, 2.8, 0, 'c5p','mN_B2');  r0402(-1.0, 2.8, 0, 'c5n','mN_B3');
  r0402( 3.0, 1.4, Math.PI/2, 'u5R2','u2R2'); r0402( 3.0, 1.2, Math.PI/2, 'u5R3','u2R3');
  r0402( 1.2,-0.8, 0, 'mN_R2','c1n');  r0402( 1.2,-1.0, 0, 'mN_R3','c2n');
  r0402(-2.2, 2.2, Math.PI/2, 'u3R2','c5p'); r0402(-2.2, 2.0, Math.PI/2, 'u3R3','c5n');

  // ── Diodes ───────────────────────────────────────────────────────────
  diode(-1.4, 1.4, 0,            'mN_B1','u3R1');
  diode( 3.4,-0.8, Math.PI/2,    'u5L1','u4R1');
  diode(-3.2,-1.6, 0,            'u4L2','c6p');
  diode( 1.4, 1.2, 0,            'mN_B4','u2L0');
  diode(-1.0,-1.8, Math.PI/2,    'mN_T0','c6n');
  diode( 2.4, 1.8, 0,            'mN_B7','u2R0');

  // ── Inductors ────────────────────────────────────────────────────────
  inductor(-1.0,-0.4, 'mN_L0','mN_L1');
  inductor( 1.4, 1.0, 'mN_R6','u2L0');
  inductor(-2.4,-2.4, 'u4L3','c6p');
  inductor( 2.8, 1.8, 'u5R2','u2R1');

  // ── Crystals ─────────────────────────────────────────────────────────
  crystal(-0.8, 2.4, 'mN_B0','mN_B1');
  crystal( 2.4, 2.4, 'u2R2','u2R3');

  // ── Connectors ───────────────────────────────────────────────────────
  // ── Edge-connector bank along the LEFT edge (powered device look) ───
  usbC(    -4.20,-1.55, 'u4L0','u4L1');                 // USB-C data/power
  screwBlock(-4.28, 0.20, 0, 'u3L0','u3L1');            // detailed 2-pin power
  jtag10(  -4.10, 1.85, 0, ['mN_L4','mN_L5','mN_L6','mN_L7','u3R0','u3R1','u3R2','u3R3','u4L2','u4L3']); // 10-pin JTAG
  // remaining right-side / front connectors
  usbC( 0.2,-2.75, 'mN_T2','mN_T3');
  jst2( 3.6, 1.2, 0, 'u5R2','u5R3');
  screwTerm( 4.0, 2.2, 0, 'u2R2','u2R3');
  gpioRightAngle(4.00, -1.35, 0, ['u5R0','u5R1','u5R2','u5R3','mN_R0','mN_R1','mN_R4','mN_R5']);

  // ── SOT-23 transistors ───────────────────────────────────────────────
  sot23( 4.0,-0.4, 0, ['u5R0','u5R1','u5R2']);
  sot23( 4.0,-0.8, 0, ['u5R1','u5R2','u5R3']);
  sot23(-3.8, 1.2, Math.PI, ['u3L0','u3L1','u3L2']);
  sot23( 2.0,-2.4, 0, ['mN_T4','mN_T5','mN_T6']);
  sot23(-2.0,-1.8, 0, ['u4L1','u4L2','u4L3']);
  sot23(-0.8, 0.4, Math.PI/2, ['mN_L4','mN_L5','mN_L6']);

  return group;
}
let allTraceMeshes = [];
const tpTraces = { TP1:[], TP2:[], TP3:[], TP4:[] };
const traceEndpoints = [];   // every point where a trace meets a pad/via

function createTraces() {
  const group = new THREE.Group();
  const yT = BOARD.depth / 2 + 0.003;
  const TW = TRACE_CONFIG.width;
  const TH = TRACE_CONFIG.height;

  let _segCount = 0;
  function seg(x1, z1, x2, z2, tpKey) {
    const dx = x2 - x1, dz = z2 - z1, len = Math.sqrt(dx*dx + dz*dz);
    if (len < 0.03) return;
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, TH, TW), matCopperTrace.clone());
    const yOff = (_segCount++ % 4) * 0.0005;
    mesh.position.set((x1+x2)/2, yT + yOff, (z1+z2)/2);
    mesh.rotation.y = -Math.atan2(dz, dx);
    group.add(mesh);
    allTraceMeshes.push(mesh);
    if (tpKey && tpTraces[tpKey]) tpTraces[tpKey].push(mesh);
  }
  function route(x1, z1, x2, z2, tpKey) {
    if (Math.abs(x1-x2) < 0.005 || Math.abs(z1-z2) < 0.005) { seg(x1,z1,x2,z2,tpKey); }
    else if (Math.abs(x2-x1) >= Math.abs(z2-z1)) { seg(x1,z1,x2,z1,tpKey); seg(x2,z1,x2,z2,tpKey); }
    else                                         { seg(x1,z1,x1,z2,tpKey); seg(x1,z2,x2,z2,tpKey); }
    traceEndpoints.push([x1,z1]); traceEndpoints.push([x2,z2]);
  }
  function tpKeyForNet(netName, pts) {
    if(netName.startsWith('mN_L') || netName.startsWith('u3') || netName.startsWith('u4')) return 'TP1';
    if(netName.startsWith('mN_R') || netName.startsWith('u2') || netName.startsWith('u5')) return 'TP2';
    if(netName.startsWith('mN_B') || netName==='c5p'||netName==='c5n') return 'TP3';
    if(netName.startsWith('mN_T') || netName==='c6p'||netName==='c6n') return 'TP4';
    const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
    const cz = pts.reduce((s,p)=>s+p[1],0)/pts.length;
    if(cx < 0 && cz > 0) return 'TP3';
    if(cx < 0 && cz < 0) return 'TP1';
    if(cx > 0 && cz < 0) return 'TP4';
    return 'TP2';
  }
  function sortedChain(pts) {
    if(pts.length <= 1) return pts;
    const rem = [...pts];
    const chain = [rem.splice(0,1)[0]];
    while(rem.length) {
      const last = chain[chain.length-1];
      let best=0, bestD=Infinity;
      rem.forEach(([x,z],i)=>{ const d=(x-last[0])**2+(z-last[1])**2; if(d<bestD){bestD=d;best=i;} });
      chain.push(rem.splice(best,1)[0]);
    }
    return chain;
  }

  // Daisy-chain every multi-pad net — pin to pin, guaranteed termination
  Object.entries(pads).forEach(([net, rawPts]) => {
    if(rawPts.length < 2) return;
    const tpKey = tpKeyForNet(net, rawPts);
    const pts = sortedChain(rawPts);
    for(let i=0; i<pts.length-1; i++) route(pts[i][0],pts[i][1], pts[i+1][0],pts[i+1][1], tpKey);
  });

  // Each TP functional pad → nearest component pad
  const allPadFlat = [];
  Object.entries(pads).forEach(([net, pts]) => { if(pts.length >= 2) pts.forEach(p => allPadFlat.push(p)); });
  TP_CONFIG.forEach((cfg, ti) => {
    const tpKey = ['TP1','TP2','TP3','TP4'][ti];
    const [tx,tz] = cfg.pos;
    let bestPt=null, bestD=Infinity;
    allPadFlat.forEach(p => { const d=(p[0]-tx)**2+(p[1]-tz)**2; if(d<bestD){bestD=d;bestPt=p;} });
    if(bestPt) route(tx,tz, bestPt[0],bestPt[1], tpKey);
  });

  // ── Trace-end copper lands: every trace visibly terminates on copper ──
  const seen = new Set();
  function via(x, z, r) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(r, 0.008, 7, 16), matVia.clone());
    ring.position.set(x, yT+0.001, z); ring.rotation.x = Math.PI/2; group.add(ring);
    const land = new THREE.Mesh(new THREE.CircleGeometry(r*1.05, 16), matCopperPad.clone());
    land.rotation.x = -Math.PI/2; land.position.set(x, yT, z); group.add(land);
    const hole = new THREE.Mesh(new THREE.CircleGeometry(r*0.45, 12), new THREE.MeshBasicMaterial({color:0x020806}));
    hole.rotation.x = -Math.PI/2; hole.position.set(x, yT+0.002, z); group.add(hole);
  }
  traceEndpoints.forEach(([x,z]) => {
    const k = Math.round(x*20)+','+Math.round(z*20);
    if(seen.has(k)) return; seen.add(k);
    const land = new THREE.Mesh(new THREE.CircleGeometry(0.035, 14), matCopperPad.clone());
    land.rotation.x = -Math.PI/2; land.position.set(x, yT-0.0005, z); group.add(land);
  });

  // Single-pad nets (decoupling grounds, orphan pins) drop a plated via
  Object.entries(pads).forEach(([net, pts]) => { if(pts.length === 1) via(pts[0][0], pts[0][1], 0.02); });

  // ── Ground-via stitching network across open areas (multilayer cue) ──
  const occupied = allPadFlat.concat(Object.values(pads).filter(p=>p.length===1).map(p=>p[0]));
  function clear(x, z) {
    if (nearMountHole(x, z, 0.7)) return false;
    if ((x*x*0.5 + z*z*0.7) < 1.3) return false;             // around MCU
    for (const [px,pz] of occupied) if ((px-x)**2+(pz-z)**2 < 0.16) return false;
    for (const cfg of TP_CONFIG) {
      const [ax,az]=cfg.pos, [bx,bz]=cfg.panel;
      if ((ax-x)**2+(az-z)**2 < 0.2) return false;
      if ((bx-x)**2+(bz-z)**2 < 0.5) return false;
    }
    return true;
  }
  let placed = 0;
  for (let gx = -4.0; gx <= 4.0; gx += 0.62) {
    for (let gz = -2.5; gz <= 2.5; gz += 0.58) {
      const x = gx + (Math.random()-0.5)*0.18;
      const z = gz + (Math.random()-0.5)*0.18;
      if (clear(x, z) && Math.random() > 0.35) { via(x, z, 0.022); placed++; }
    }
  }

  return group;
}

// ── Silkscreen: serials, designators, polarity marks (top face) ─────────
function addSilkscreenLabels(_group) {

    ctx.fillStyle = color || '#e6ecd8';

    ctx.textBaseline = 'middle';
    ctx.fillText(text, 6, ch/2);
    const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter;
    const aspect = cw/ch, h = w/aspect;
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
      new THREE.MeshBasicMaterial({ map:tex, transparent:true, opacity:0.82, depthWrite:false, side:THREE.DoubleSide }));
    mesh.rotation.x = (face==='bottom') ? Math.PI/2 : -Math.PI/2;
    mesh.position.set(x, face==='bottom'?yBot:yTop, z);

  silk('JTAG',    -3.55, 1.85, 0.55,'#cfd8c2', 52);
  silk('1',       -4.17, 1.50, 0.12,'#d6dcc4', 60);   // JTAG pin-1
  silk('+ -',     -4.30, 0.45, 0.3, '#d6dcc4', 50);

  // Backside info silkscreen (kept, lighter)
}
/* =====================================================================
   TEST POINTS — pogo-pin pads with etched neon silkscreen labels
   ===================================================================== */
function createGlowSprite(color, size = 1.2) {
  const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(64,64,0,64,64,60);
  grad.addColorStop(0, color + 'cc'); grad.addColorStop(0.25, color + '66');
  grad.addColorStop(0.6, color + '1a'); grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, blending:THREE.AdditiveBlending, transparent:true, depthWrite:false, opacity:0 }));
  sprite.scale.set(size, size, 1);
  return sprite;
}

// Hovering neon UI panel: "TP# | WORD" with arrow cue (billboards to camera)
function createNeonLabel(idTxt, word, cssColor) {
  const cw = 440, ch = 100;
  const canvas = document.createElement('canvas'); canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = 'rgba(6,11,16,0.92)';
  ctx.strokeStyle = cssColor; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(3,3,cw-6,ch-6,12); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = cssColor + '40'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.roundRect(3,3,cw-6,ch-6,12); ctx.stroke();
  ctx.textBaseline = 'middle';
  ctx.shadowColor = cssColor; ctx.shadowBlur = 12;
  ctx.fillStyle = cssColor; ctx.font = 'bold 30px "Share Tech Mono", monospace';
  const idW = ctx.measureText(idTxt + '  ').width;
  ctx.fillText(idTxt, 22, ch/2 - 3);
  ctx.shadowBlur = 0; ctx.fillStyle = cssColor + 'aa';
  ctx.fillRect(22 + idW, 22, 3, ch - 44);
  ctx.shadowColor = cssColor; ctx.shadowBlur = 12; ctx.fillStyle = '#eef4ff';
  const wx = 22 + idW + 16; ctx.fillText(word, wx, ch/2 - 3);
  ctx.shadowBlur = 6; ctx.fillStyle = cssColor;
  const ww = ctx.measureText(word).width; ctx.fillRect(wx, ch/2 + 22, ww, 2.5);
  ctx.shadowBlur = 8; const ax = wx + ww + 14, ay = ch/2 - 2;
  ctx.beginPath(); ctx.moveTo(ax,ay-7); ctx.lineTo(ax+9,ay); ctx.lineTo(ax,ay+7); ctx.closePath(); ctx.fill();
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:true, opacity:0.95 }));
  const aspect = cw/ch; sprite.scale.set(aspect*0.42, 0.42, 1);
  return sprite;
}

/* =====================================================================
   BACKSIDE silkscreen helper (mirrored → legible from below)
   ===================================================================== */
function bottomText(text, x, z, w, color, font, align) {
  const cw = 1024, ch = 150;
  const canvas = document.createElement('canvas'); canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,cw,ch);
  // (no bottom-face mirroring)
  ctx.fillStyle = color || '#e6ecd8';
  ctx.font = `bold ${font || 64}px "Share Tech Mono", monospace`;
  ctx.textBaseline = 'middle'; ctx.textAlign = align || 'center';
  ctx.shadowColor = color || '#fff'; ctx.shadowBlur = 6;
  ctx.fillText(text, align === 'left' ? 10 : cw/2, ch/2);
  const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter;

  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h),

  return mesh;
}

/* =====================================================================

   ===================================================================== */
// 3x5 pixel font (only glyphs we need)
const FONT = {
  '0':['111','101','101','101','111'],'1':['010','110','010','010','111'],
  '2':['111','001','111','100','111'],'3':['111','001','111','001','111'],
  '4':['101','101','111','001','001'],'5':['111','100','111','001','111'],
  '6':['111','100','111','101','111'],'7':['111','001','010','010','010'],
  '8':['111','101','111','101','111'],'9':['111','101','111','001','111'],
  'R':['110','101','110','101','101'],'O':['111','101','101','101','111'],
  'A':['010','101','111','101','101'],'D':['110','101','101','101','110'],
  'S':['111','100','111','001','111'],'H':['101','101','111','101','101'],
  'C':['111','100','100','100','111'],'E':['111','100','111','100','111'],
  'G':['111','100','101','101','111'],'M':['101','111','111','101','101'],

  ':':['0','1','0','1','0'],' ':['00','00','00','00','00'],
};

const Game = {
  GW: 64, GH: 32, CS: 8,
  matMesh:null, matCtx:null, matCanvas:null, matTex:null,
  dpad:[], pickers:[],
  // road / gameplay geometry (cell coordinates)
  roadL: 22, roadR: 42, PROW: 21, ROAD_TOP: 7, ROAD_BOT: 23,
  baseSpeed: 9, minSpeed: 6, maxSpeed: 18,
  playerX: 32, targetX: 32, speed: 9, score: 0, lives: 3,
  entities: [], spawnTimer: 0.6, scrollY: 0, dist: 0, t: 0, redrawT: 0,
  crashT: 0, gameOver: false, overBlink: 0,
  pressGlow: {},

  init(scene) {
    const yB = -BOARD.depth/2;
    const grp = new THREE.Group();

    // through-hole vias (front-side connections showing through)
    function via(x,z,r){
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.008,7,14), matVia.clone());
      ring.rotation.x=Math.PI/2; ring.position.set(x,yB-0.003,z); grp.add(ring);
      const hole=new THREE.Mesh(new THREE.CircleGeometry(r*0.45,10), new THREE.MeshBasicMaterial({color:0x020806}));
      ring.userData={}; hole.rotation.x=Math.PI/2; hole.position.set(x,yB-0.005,z); grp.add(hole);
    }
    // green ground hatch
    const hatchMat=new THREE.LineBasicMaterial({color:0x14532a,transparent:true,opacity:0.45});
    for(let gx=-4;gx<=4;gx+=0.55){ grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(gx,yB-0.003,-2.6),new THREE.Vector3(gx,yB-0.003,2.6)]),hatchMat)); }
    for(let gz=-2.6;gz<=2.6;gz+=0.55){ grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-4,yB-0.003,gz),new THREE.Vector3(4,yB-0.003,gz)]),hatchMat)); }
    for(let i=0;i<60;i++){
      const x=(Math.random()-0.5)*8.2, z=(Math.random()-0.5)*5.2;
      if (Math.abs(x)<2.0 && Math.abs(z)<1.1) continue;     // keep clear of screen
      if (Math.abs(x)>2.2 && Math.abs(x)<3.4 && Math.abs(z)<0.9) continue; // controls
      if (nearMountHole(x,z,0.75)) continue;
      via(x,z,0.022);
    }

    // ── LED matrix screen (canvas → emissive plane) ───────────────────
    const W = this.GW*this.CS, H = this.GH*this.CS;
    this.matCanvas = document.createElement('canvas'); this.matCanvas.width=W; this.matCanvas.height=H;
    this.matCtx = this.matCanvas.getContext('2d');
    this.matTex = new THREE.CanvasTexture(this.matCanvas); this.matTex.minFilter=THREE.LinearFilter; this.matTex.magFilter=THREE.NearestFilter;
    const screenW = 3.4, screenH = screenW * (H/W);
    // dark bezel
    const bezel=new THREE.Mesh(new THREE.BoxGeometry(screenW+0.22,0.07,screenH+0.22),
      new THREE.MeshStandardMaterial({color:0x07090c,roughness:0.5,metalness:0.3,envMapIntensity:0.7}));
    bezel.position.set(0,yB-0.035,0); grp.add(bezel);
    this.matMesh=new THREE.Mesh(new THREE.PlaneGeometry(screenW,screenH),
      new THREE.MeshBasicMaterial({ map:this.matTex, transparent:false, side:THREE.DoubleSide }));
    this.matMesh.rotation.x=Math.PI/2;   // mirrored in canvas paint instead
    this.matMesh.position.set(0,yB-0.075,0); grp.add(this.matMesh);
    // matrix illumination
    this.screenLightA=new THREE.PointLight(0x66ccff,0.6,3.0,2.0); this.screenLightA.position.set(-0.6,yB-0.5,0); grp.add(this.screenLightA);
    this.screenLightB=new THREE.PointLight(0xffaa33,0.5,3.0,2.0); this.screenLightB.position.set(0.6,yB-0.5,0); grp.add(this.screenLightB);

    // ── D-pad (left) — cross with 4 clickable arms ────────────────────
    const dpx=-2.45, dpz=0.0;
    const darkBtn=()=>new THREE.MeshStandardMaterial({color:0x16181d,roughness:0.45,metalness:0.25,envMapIntensity:0.9,emissive:new THREE.Color(0x66ccff),emissiveIntensity:0.0});
    const dcenter=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.18,0.10,20),
      new THREE.MeshStandardMaterial({color:0x101216,roughness:0.5,metalness:0.3,envMapIntensity:0.8}));
    dcenter.position.set(dpx,yB-0.10,dpz); grp.add(dcenter);
    const arms=[['U',0,-0.30],['D',0,0.30],['L',-0.30,0],['R',0.30,0]];
    arms.forEach(([dir,ox,oz])=>{
      const mat=darkBtn();
      const arm=new THREE.Mesh(new THREE.BoxGeometry(Math.abs(ox)>0?0.34:0.22, 0.10, Math.abs(oz)>0?0.34:0.22), mat);
      arm.position.set(dpx+ox,yB-0.10,dpz+oz); grp.add(arm);
      const lt=new THREE.PointLight(0x66ccff,0.0,1.4,2.0); lt.position.set(dpx+ox,yB-0.3,dpz+oz); grp.add(lt);
      const pk=new THREE.Mesh(new THREE.CircleGeometry(0.2,14),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
      pk.rotation.x=Math.PI/2; pk.position.set(dpx+ox,yB-0.18,dpz+oz);
      pk.userData.game='dpad'; pk.userData.dir=dir; grp.add(pk);
      this.pickers.push(pk); this.dpad.push({mat,light:lt,dir});
    });
    grp.add(bottomText('D-PAD', dpx, dpz+0.62, 0.9, '#9fb094', 54, 'center'));

    scene.add(grp);
    this.reset();
  },

  reset() {
    this.playerX = 32; this.targetX = 32; this.speed = this.baseSpeed;
    this.score = 0; this.lives = 3; this.entities = []; this.spawnTimer = 0.7;
    this.scrollY = 0; this.dist = 0; this.crashT = 0; this.gameOver = false; this.overBlink = 0;
    this.draw();
  },

  spawn() {
    const x = this.roadL + 2 + Math.floor(Math.random() * (this.roadR - this.roadL - 3));
    const type = Math.random() < 0.6 ? 'rival' : 'oil';
    this.entities.push({ x, y: this.ROAD_TOP - 1, type, hit:false });
  },

  // ── pixel scene composition ──────────────────────────────────────────
  draw() {
    const GW=this.GW, GH=this.GH;
    const px = new Int32Array(GW*GH).fill(-1);
    const set=(x,y,c)=>{ x=Math.round(x); y=Math.round(y); if(x>=0&&x<GW&&y>=0&&y<GH) px[y*GW+x]=c; };
    const text=(str,x0,y0,col)=>{
      let cx=x0;
      for (const ch of str){
        const g=FONT[ch]||FONT[' ']; const wgl=g[0].length;
        for(let r=0;r<5;r++) for(let c=0;c<wgl;c++) if(g[r][c]==='1') set(cx+c,y0+r,col);
        cx += wgl+1;
      }
    };

    // title + lives (top-right blocks)
    text('ROAD RASH', 12, 1, 0xff3b30);
    for(let i=0;i<3;i++){ const lx=53+i*4, c=(i<this.lives)?0xff4040:0x332128;
      set(lx,1,c); set(lx+1,1,c); set(lx,2,c); set(lx+1,2,c); }

    if (this.gameOver) {
      if (Math.floor(this.overBlink*2)%2===0){ text('GAME',24,10,0xffd23a); text('OVER',24,16,0xffd23a); }
      text('SCORE '+this.score, 8, 26, 0xeef4ff);
      this.paint(px); return;
    }

    // straight 2-lane road with scrolling lane + centre dashes
    const L=this.roadL, R=this.roadR, mid=(L+R)>>1;
    for(let y=this.ROAD_TOP;y<=this.ROAD_BOT;y++){
      for(let x=L;x<=R;x++) set(x,y,0x33343c);
      set(L,y,0x6a6a52); set(R,y,0x6a6a52);
      set(L-1,y,0x163b1c); set(R+1,y,0x163b1c);
      if(((y+Math.floor(this.scrollY))%4)<2) set(mid,y,0xffd23a);
      if(((y+Math.floor(this.scrollY))%6)<2){ set(L+7,y,0x55554a); set(R-7,y,0x55554a); }
    }
    // hazards
    for(const e of this.entities){
      const yy=Math.round(e.y);
      if(e.type==='rival'){ set(e.x,yy,0x33dd55); set(e.x,yy+1,0x119933); set(e.x,yy+2,0x113018); }
      else { set(e.x,yy,0x70707e); set(e.x+1,yy,0x44444f); set(e.x,yy+1,0x44444f); }   // oil slick
    }
    // player bike
    set(this.playerX,this.PROW-1,0xffffff);
    set(this.playerX,this.PROW,0xff5533);
    set(this.playerX,this.PROW+1,0x222222);

    text('SCORE '+this.score, 8, 26, 0xeef4ff);
    this.paint(px);
  },

  paint(px) {
    const GW=this.GW, GH=this.GH, CS=this.CS, ctx=this.matCtx;
    ctx.fillStyle='#05070a'; ctx.fillRect(0,0,GW*CS,GH*CS);
    for(let y=0;y<GH;y++) for(let x=0;x<GW;x++){
      const c=px[y*GW+x]; const X=x*CS, Y=y*CS;
      if(c<0){ ctx.fillStyle='rgba(20,28,24,0.5)'; ctx.fillRect(X+1,Y+1,CS-2,CS-2); }
      else {
        const r=(c>>16)&255,g=(c>>8)&255,b=c&255;
        ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(X+1,Y+1,CS-2,CS-2);
        ctx.fillStyle=`rgba(${r},${g},${b},0.35)`; ctx.fillRect(X,Y,CS,CS);
      }
    }
    if(this.matTex) this.matTex.needsUpdate=true;
  },

  steer(dir){
    this.pressGlow['d'+dir]=0.6;
    if(this.gameOver) return;
    if(dir==='L') this.targetX=Math.max(this.roadL+2, this.targetX-3);
    if(dir==='R') this.targetX=Math.min(this.roadR-2, this.targetX+3);
    if(dir==='U') this.speed=Math.min(this.maxSpeed, this.speed+2);
    if(dir==='D') this.speed=Math.max(this.minSpeed, this.speed-2);
  },
  handlePick(obj){ if(obj.userData.game==='dpad') this.steer(obj.userData.dir); },

  update(dt){
    this.t+=dt;

    // D-pad glow decay + light
    this.dpad.forEach(d=>{
      const g=this.pressGlow['d'+d.dir]||0;
      d.mat.emissiveIntensity = g*0.9; d.light.intensity = g*1.2;
      if(g>0) this.pressGlow['d'+d.dir]=Math.max(0,g-dt*1.5);
    });

    // screen lights (red tint briefly on crash)
    const crash=this.crashT>0; if(this.crashT>0) this.crashT-=dt;
    this.screenLightA.intensity = 0.4 + 0.2*Math.sin(this.t*5) + (crash?0.9:0);
    this.screenLightB.intensity = 0.35 + 0.2*Math.cos(this.t*4);
    this.screenLightA.color.setHex(crash?0xff3b30:0x66ccff);

    if(this.gameOver){
      this.overBlink+=dt; this.redrawT+=dt;
      if(this.redrawT>0.1){ this.redrawT=0; this.draw(); }
      return;
    }

    // player eases toward chosen lane
    this.playerX += (this.targetX-this.playerX)*Math.min(1, dt*12);

    // SCORE = distance travelled (smooth, monotonic, intuitive)
    this.dist += this.speed * dt * 5;
    this.score = Math.floor(this.dist);
    this.scrollY += this.speed*dt;

    // spawn hazards on a speed-scaled cadence
    this.spawnTimer-=dt;
    if(this.spawnTimer<=0){ this.spawn(); this.spawnTimer = Math.max(0.5, 1.25 - this.speed*0.04); }

    // advance + fair lane collision at the player's row
    for(const e of this.entities){
      e.y += this.speed*dt;
      if(!e.hit && e.y>=this.PROW-1 && e.y<=this.PROW+1 && Math.abs(e.x-this.playerX)<=1){
        e.hit=true; this.crashT=0.5; this.lives--;
        this.speed=Math.max(this.baseSpeed, this.speed-3);
        if(this.lives<=0){ this.lives=0; this.gameOver=true; }
      }
    }
    this.entities = this.entities.filter(e => e.y<=this.ROAD_BOT+1 && !e.hit);

    // redraw ~22fps
    this.redrawT+=dt;
    if(this.redrawT>0.045){ this.redrawT=0; this.draw(); }
  },
};

function buildScene() {
  scene.add(createBoard());
  scene.add(createComponents());
  scene.add(createTraces());
  addSilkscreenLabels(scene);
  scene.add(createTestPoints());
  Game.init(scene);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.ShadowMaterial({ opacity:0.4 }));
  ground.rotation.x = -Math.PI/2; ground.position.y = -0.5; ground.receiveShadow = true;
  scene.add(ground);
}

const tooltip = document.getElementById('tooltip');
const tooltipLabel = document.getElementById('tooltip-label');
const tooltipHint = document.getElementById('tooltip-hint');
function updateTooltip(visible, label, hint, x, y, cssColor) {
  if (visible) {
    tooltipLabel.textContent = label; tooltipLabel.style.color = cssColor;
    if (tooltipHint) tooltipHint.textContent = hint;
    tooltip.style.borderColor = cssColor + '66';
    tooltip.style.left = (x + 18) + 'px'; tooltip.style.top = (y - 30) + 'px';
    tooltip.classList.add('visible');
  } else tooltip.classList.remove('visible');
}

let mouseX = 0, mouseY = 0;
let hoveredGame = null;
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * -2 + 1;
  mouseX = e.clientX; mouseY = e.clientY;
});
window.addEventListener('click', () => {
  if (viewSide === 'back') { if (hoveredGame) Game.handlePick(hoveredGame); }
  else { if (hoveredTP !== null) openModal(hoveredTP); }
});

let touchStartTime = 0, touchStartPos = { x:0, y:0 };
window.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { touchStartTime = Date.now(); touchStartPos.x = e.touches[0].clientX; touchStartPos.y = e.touches[0].clientY; }
}, { passive:true });
window.addEventListener('touchend', e => {
  const dt = Date.now() - touchStartTime, ct = e.changedTouches[0];
  const dist = Math.hypot(ct.clientX - touchStartPos.x, ct.clientY - touchStartPos.y);
  if (dt < 300 && dist < 20) {
    mouse.x = (ct.clientX / window.innerWidth) * 2 - 1;
    mouse.y = (ct.clientY / window.innerHeight) * -2 + 1;
    mouseX = ct.clientX; mouseY = ct.clientY;
    if (raycaster) {
      raycaster.setFromCamera(mouse, camera);
      if (viewSide === 'back') {
        const hits = raycaster.intersectObjects(Game.pickers);
        if (hits.length>0) Game.handlePick(hits[0].object);
      } else {
        const tgts = []; testPointMeshes.forEach(tp => { tgts.push(tp.picker, tp.word); });
        const hits = raycaster.intersectObjects(tgts);
        if (hits.length>0) openModal(hits[0].object.userData.tpIndex);
      }
    }
    setTimeout(() => { mouse.x = -999; mouse.y = -999; }, 100);
  }
}, { passive:true });
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (viewSide === 'back') {
    const k=e.key.toLowerCase();
    if(k==='arrowleft') Game.steer('L'); else if(k==='arrowright') Game.steer('R');
    else if(k==='arrowup') Game.steer('U'); else if(k==='arrowdown') Game.steer('D');
    else if(k==='r') Game.reset();
  }
});

function performRaycast() {
  if (!raycaster) return;
  raycaster.setFromCamera(mouse, camera);

  if (viewSide === 'back') {
    if (hoveredTP !== null) { testPointMeshes.forEach(tp=>tp._targetGlow=0); hoveredTP=null; }
    const hits = raycaster.intersectObjects(Game.pickers);
    hoveredGame = hits.length>0 ? hits[0].object : null;
    if (hoveredGame){
      const u=hoveredGame.userData;
      const lbl = u.game==='dpad' ? ('D-PAD '+u.dir) : ('BTN '+u.key);
      updateTooltip(true, lbl, '▸ PLAY', mouseX, mouseY, '#7fe6c0');
      document.body.style.cursor='pointer';
    } else { updateTooltip(false); document.body.style.cursor='default'; }
    return;
  }

  hoveredGame = null;
  const tgts = []; testPointMeshes.forEach(tp => { tgts.push(tp.picker, tp.word); });
  const hits = raycaster.intersectObjects(tgts);
  hoveredTP = hits.length > 0 ? hits[0].object.userData.tpIndex : null;
  testPointMeshes.forEach((tp, i) => { tp._targetGlow = (i === hoveredTP) ? 1.0 : 0.0; });
  if (hoveredTP !== null) {
    const cfg = testPointMeshes[hoveredTP].config;
    updateTooltip(true, cfg.word, '▸ OPEN', mouseX, mouseY, cfg.cssColor);
    document.body.style.cursor = 'pointer';
  } else { updateTooltip(false); document.body.style.cursor = 'default'; }
}

/* =====================================================================
   FLIP VIEW — tween camera between top and backside
   ===================================================================== */
const flipBtn = document.getElementById('flip-btn');
const sideTag = document.getElementById('side-tag');
const rrReset = document.getElementById('rr-reset');
const onboardHint = document.getElementById('onboard-hint');
if (rrReset) rrReset.addEventListener('click', () => Game.reset());
function flipView() {
  // tween camera under/over the board; the *active side* is derived from
  // camera height every frame (so manual orbiting works too).
  const goingBack = !(camera.position.y < 0);
  camTween = goingBack ? new THREE.Vector3(6, -5, 9) : new THREE.Vector3(6, 5, 9);
  idleRotating = false;
}
function updateSideUI() {
  const back = (viewSide === 'back');
  if (sideTag) sideTag.textContent = back ? 'BACKSIDE · ROAD RASH' : 'TOP SIDE';
  if (rrReset) rrReset.style.display = back ? 'flex' : 'none';
  if (onboardHint) {
    onboardHint.textContent = back ? 'TAP THE D-PAD TO STEER · AVOID THE BIKES' : 'TAP A GLOWING TEST POINT TO EXPLORE';
    onboardHint.classList.add('show');
    clearTimeout(window._hintT); window._hintT = setTimeout(() => onboardHint.classList.remove('show'), 3500);
  }
}
if (flipBtn) flipBtn.addEventListener('click', flipView);


let pulseT = 0;
function animate() {
  animFrameId = requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  pulseT += dt;

  // camera flip tween
  if (camTween) {
    camera.position.lerp(camTween, 0.09);
    camera.lookAt(0, 0, 0);
    if (camera.position.distanceTo(camTween) < 0.05) { camera.position.copy(camTween); camTween = null; }
  }
  controls.update();

  // drifting space backdrop
  if (starfield) { starfield.rotation.y += dt * 0.006; starfield.material.opacity = 0.78 + Math.sin(pulseT * 0.6) * 0.12; }
  if (nebula) nebula.rotation.y += dt * 0.004;

  // derive the active side from the camera height (board normal stays ±Y)
  const nowBack = camera.position.y < 0;
  if ((viewSide === 'back') !== nowBack) { viewSide = nowBack ? 'back' : 'top'; updateSideUI(); }

  // idle rotation only on the top side, and never while the game is shown
  if (idleRotating && viewSide === 'top' && !camTween && !overlay.classList.contains('open'))
    scene.rotation.y += dt * 0.05;

  Game.update(dt);
  performRaycast();

  const anyHovered = hoveredTP !== null;
  const hoveredColor = anyHovered ? new THREE.Color(testPointMeshes[hoveredTP].config.color) : null;
  const topVisible = (viewSide === 'top');

  testPointMeshes.forEach((tp, i) => {
    tp.word.visible = topVisible;
    tp.glow.visible = topVisible;
    if (tp.stem) tp.stem.visible = topVisible;
    tp.glowT += (tp._targetGlow - tp.glowT) * (1 - Math.exp(-10 * dt));
    const g = tp.glowT;
    const breathe = 0.06 + Math.sin(pulseT * 2.2 + i * 1.3) * 0.03;
    tp.outerMat.emissiveIntensity = breathe + g * 0.5;
    tp.padMat.emissiveIntensity   = breathe + g * 0.6;
    tp.glow.material.opacity  = 0.06 + breathe*0.4 + g * 0.32;
    tp.word.material.opacity  = topVisible ? (0.92 + g * 0.08) : 0;
    if (tp.stemMat) { tp.stemMat.emissiveIntensity = 0.35 + g*0.5; tp.stemMat.opacity = 0.5 + g*0.4; }
    tp.bleed.intensity = topVisible ? (0.45 + breathe + g * 1.4) : 0;
  });

  allTraceMeshes.forEach((mesh, ti) => {
    if (anyHovered) {
      const phase = (pulseT * 1.8 - ti * 0.09) % 2.8;
      const pulseVal = (phase > 0 && phase < 1) ? Math.sin(phase * Math.PI) : 0;
      mesh.material.emissive.copy(hoveredColor);
      mesh.material.emissiveIntensity = 0.4 + 0.4 * pulseVal;
    } else {
      mesh.material.emissive.set(0xb35f1e);
      mesh.material.emissiveIntensity = 0.07 + Math.sin(pulseT * 0.8 + ti * 0.3) * 0.03;
    }
  });

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function init() {
  initScene(); initLighting(); initMaterials(); buildScene();
  setTimeout(() => { idleRotating = true; }, 1500);
  animate();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 700);
    updateSideUI();   // show the initial onboarding hint
  }, 600);
}
init();
</script>
